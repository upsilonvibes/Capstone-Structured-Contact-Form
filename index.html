<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Contact Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <form id="contactForm">

            <fieldset> <!--Fieddset forms the rectangular boundary around the form-->
            <legend>Send us a Message</legend> <!--Legend writes content inside the rectangular boundary-->

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required minlength="3" placeholder="e.g. John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@company.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" 
                           pattern="+[0-9]{3}-[0-9]{3}-[0-9]{3}-[0-9]{4}" 
                           placeholder="+000-123-456-7890" 
                           required minlength="12" maxlength="16"
                           aria-describedby="phoneHint">
                    <small id="phoneHint">Expected format: +000-123-456-7890</small>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required>
                        <option value="" disabled selected>Choose a topic...</option>
                        <option value="support">Technical Support</option>
                        <option value="billing">Billing Inquiry</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" required minlength="10" placeholder="Tell us more..."></textarea>
                </div>

                <button type="submit" id="submitBtn">Send Message</button>
            </fieldset>
        </form>
        <div id="successMessage" class="hidden">¡Gracias! Your message has been sent.</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
